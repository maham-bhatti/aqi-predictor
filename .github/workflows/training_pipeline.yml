# Training Pipeline Workflow
name: Daily Training Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # runs every day at 2 AM
  workflow_dispatch:       # manual trigger button

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy supabase python-dotenv
          pip install scikit-learn xgboost joblib shap matplotlib seaborn

      - name: Run training pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python training_pipeline/training_pipeline.py

      - name: Save model to repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add models/
          git commit -m "Auto: Updated model $(date '+%Y-%m-%d')" || echo "No changes"
          git push